name: Build BoutikCredit APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
      - name: google-services
        run: echo '{"project_info":{"project_number":"695609211507","project_id":"egcsarlu-app-b2ba4","storage_bucket":"egcsarlu-app-b2ba4.firebasestorage.app"},"client":[{"client_info":{"mobilesdk_app_id":"1:695609211507:android:461499ea4c20493e2c8806","android_client_info":{"package_name":"com.boutikcredit.app"}},"api_key":[{"current_key":"AIzaSyAjKGNOv-cbv7PPN8vYPDf2eAOSuGLNVQQ"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > android/app/google-services.json

      - name: Setup keystore
        continue-on-error: true
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_BASE64" | tr -d ' \n' | base64 -d > android/app/boutikcredit.jks
          echo "storePassword=$KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=boutikcredit.jks" >> android/key.properties
          ls -la android/app/boutikcredit.jks || echo "keystore non créé"
          ls -la android/key.properties || echo "key.properties non créé" 

      - run: flutter pub get

      - name: Build APK
        continue-on-error: true
        run: flutter build apk --release --no-tree-shake-icons --split-per-abi

      - name: Find APK
        if: always()
        run: find . -name "*.apk" 2>/dev/null | head -10 || echo "Aucun APK"

      - name: Upload AAB
        continue-on-error: true
        run: flutter build appbundle --release --no-tree-shake-icons

      - uses: actions/upload-artifact@v4
        with:
          name: BoutikCredit-APK
          path: |
            android/app/build/outputs/flutter-apk/*.apk
            android/app/build/outputs/apk/release/*.apk
