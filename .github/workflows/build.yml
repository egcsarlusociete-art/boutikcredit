name: Build BoutikCredit APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
      - name: google-services
        run: echo '{"project_info":{"project_number":"695609211507","project_id":"egcsarlu-app-b2ba4","storage_bucket":"egcsarlu-app-b2ba4.firebasestorage.app"},"client":[{"client_info":{"mobilesdk_app_id":"1:695609211507:android:000000000000000000000000","android_client_info":{"package_name":"com.boutikcredit.app"}},"api_key":[{"current_key":"AIzaSyAEH02fzyMn9khdFvPVSIieINHJptfbwoU"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > android/app/google-services.json
      - run: flutter pub get
      - name: Build APK via Gradle direct
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null | xargs ls -lh
      - uses: actions/upload-artifact@v4
        with:
          name: BoutikCredit-APK
          path: "**/*.apk"
