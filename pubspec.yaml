name: boutikcredit
description: BoutikCredit — Marketplace à crédit avec cashback et livraison gratuite
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.8.0
  go_router: ^13.0.0
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.3
  share_plus: ^7.2.1
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1
  uuid: ^4.2.2
  youtube_player_flutter: ^9.0.4
  qr_flutter: ^4.1.0

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/logo_boutikcredit.png"
  adaptive_icon_background: "#E85D04"
  adaptive_icon_foreground: "assets/images/logo_boutikcredit.png"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo_boutikcredit.png"
  min_sdk_android: 21
  adaptive_icon_background: "#E84A1A"
  adaptive_icon_foreground: "assets/images/logo_boutikcredit.png"

flutter_native_splash:
  color: "#E84A1A"
  image: assets/images/logo_boutikcredit.png
  android: true
  ios: false
  android_gravity: center
  image_dark: assets/images/logo_boutikcredit.png
  color_dark: "#E84A1A"
  android_12:
    image: assets/images/logo_boutikcredit.png
    color: "#E84A1A"
    icon_background_color: "#E84A1A"
    image_dark: assets/images/logo_boutikcredit.png
    color_dark: "#E84A1A"
    icon_background_color_dark: "#E84A1A"
