name: boutikcredit
description: BoutikCredit — Marketplace à crédit avec cashback et livraison gratuite
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.10
  firebase_analytics: ^10.8.0
  go_router: ^13.0.0
  riverpod: ^2.4.9
  flutter_riverpod: ^2.4.9
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.3
  share_plus: ^7.2.1
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1
  uuid: ^4.2.2
  youtube_player_flutter: ^9.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
